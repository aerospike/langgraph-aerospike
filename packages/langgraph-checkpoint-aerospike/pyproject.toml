[build-system]
requires = ["setuptools>=77.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "langgraph-checkpoint-aerospike"
version = "0.3.0"
description = "Aerospike-based checkpoint saver for LangGraph"
readme = "README.md"
requires-python = ">=3.10"
license = "Apache-2.0"
license-files = ["LICENSE"]
authors = [
    {name = "Aerospike, Inc.", email = "info@aerospike.com"}
]
keywords = ["langgraph", "aerospike", "checkpoint"]
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Database",
]
dependencies = [
  "langgraph>=1.0",
  "langchain-core>=1.0",
  "aerospike>=15.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8",
]

[project.urls]
Repository = "https://github.com/aerospike/aerospike-langgraph/tree/main/packages/langgraph-checkpoint-aerospike"

[tool.setuptools.packages.find]
namespaces = true
include = ["langgraph.checkpoint.*"]

# Deptry: imports vs declared dependencies. Needs PEP 420 mode because
# this package contributes to the shared `langgraph.*` namespace.
[tool.deptry]
experimental_namespace_package = true
