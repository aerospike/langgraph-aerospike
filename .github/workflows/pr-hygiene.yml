name: PR Hygiene - PR Title

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read

jobs:
  validate-pr-title:
    uses: aerospike/shared-workflows/.github/workflows/reusable_pr-hygiene.yml@cadeba5cc6b45f18928d94cbbaf66095e0e62a7d # v3.9.0
    with:
      pr_title: ${{ github.event.pull_request.title }}
      pr-labels: ${{ toJSON(github.event.pull_request.labels.*.name) }}
      types-requiring-jira: ""
