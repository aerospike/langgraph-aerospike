name: PR Hygiene - Jira Ticket in Title

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read

jobs:
  validate-jira-ticket:
    uses: aerospike/shared-workflows/.github/workflows/reusable_pr-hygiene.yml@610a9431704d7d385f0c13243025bcf2ae73e228 # v3.6.0
    with:
      pr_title: ${{ github.event.pull_request.title }}
      pr-labels: ${{ toJSON(github.event.pull_request.labels.*.name) }}
